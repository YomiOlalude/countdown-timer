<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="./styles.css" />
    <link rel="icon" href="./Pictures/logo.png" />
    <title>CountDown Timer</title>
  </head>
  <body>
    <h1>2021 New Year's Eve</h1>

    <div class="countdown-container">
      <div class="bigCont">
        <div class="cDays cdCalendar">
          <p class="bigText" id="days">0</p>
          <span>Days</span>
        </div>

        <div class="cHOurs cdCalendar">
          <p class="bigText" id="hours">0</p>
          <span>Hours</span>
        </div>

        <div class="cMinutes cdCalendar">
          <p class="bigText" id="minutes">0</p>
          <span>Minutes</span>
        </div>

        <div class="cSeconds cdCalendar">
          <p class="bigText" id="seconds">0</p>
          <span>Seconds</span>
        </div>
      </div>
    </div>

    <footer>Created by Yomi Olalude</footer>

    <script src="./script.js"></script>
  </body>
</html>
